name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A new push to a PR makes the in-flight run pointless.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 18 is the floor declared in `engines`; 22 is current LTS. If the floor
        # ever stops working, that is a breaking change we want CI to say out loud.
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      # Type-checks src, tests, AND tests/types.test-d.tsx — the type-contract
      # suite, whose `@ts-expect-error` cases only fail here. No runtime test can
      # check a type claim, so this is not redundant with `npm test`.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  geo-data:
    name: geo data is in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # src/geo/data/*.json is generated by scripts/build-geo.mjs but committed,
      # so tests and consumers don't need the ~4 MB of Natural Earth devDeps.
      # That only works if the two never drift: a hand-edit to the data, or a
      # change to the script without a regenerate, would ship boundaries that do
      # not match the code that claims to produce them.
      - name: Regenerate and diff
        run: |
          npm run geo
          if ! git diff --quiet -- src/geo/data; then
            echo "::error::Committed geo data does not match scripts/build-geo.mjs output. Run 'npm run geo' and commit the result."
            git diff --stat -- src/geo/data
            exit 1
          fi
          echo "Geo data matches the build script."

  demo:
    name: demo builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The demo imports the library through a source alias, so this catches
      # anything that breaks real consumer usage without breaking the unit tests.
      - name: Build demo
        working-directory: examples/demo
        run: |
          npm install
          npx tsc --noEmit
          npm run build

  package:
    name: package contents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      # Guards the whole publish surface at once: that the tarball contains the
      # dist it should, and that a real consumer can import ESM, CJS, and the
      # ./geo subpath and get working code back.
      - name: Verify the published artifact
        run: |
          npm pack --dry-run
          node -e "
            const { execSync } = require('node:child_process');
            const files = execSync('npm pack --dry-run --json').toString();
            const [{ files: f }] = JSON.parse(files);
            const names = f.map((x) => x.path);
            for (const need of ['dist/index.js', 'dist/index.cjs', 'dist/index.d.ts', 'dist/geo.js', 'LICENSE', 'README.md']) {
              if (!names.includes(need)) throw new Error('Missing from package: ' + need);
            }
            if (names.some((n) => n.startsWith('src/') || n.startsWith('tests/'))) {
              throw new Error('Source or tests leaked into the published package');
            }
            console.log('Package contents OK:', names.length, 'files');
          "

      - name: Smoke test the built package
        run: |
          npm pack
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y > /dev/null
          npm install "$GITHUB_WORKSPACE"/react-threat-map-*.tgz react@18 react-dom@18
          node --input-type=module -e "
            import { aggregateAttacks, lookupRegionCode, ThreatMap } from 'react-threat-map';
            import { loadGeoData } from 'react-threat-map/geo';
            if (typeof ThreatMap !== 'function') throw new Error('ThreatMap is not a component');
            if (lookupRegionCode('US-CA').name !== 'California') throw new Error('region lookup broken');
            if (lookupRegionCode('SG').name !== 'Singapore') throw new Error('small-country lookup broken');
            const t = aggregateAttacks([{ id: 'a', from: 'US-CA', to: 'FR' }, { id: 'b', from: 'US-CA', to: 'FR' }]);
            if (t.length !== 1 || t[0].count !== 2) throw new Error('aggregation broken');
            const geo = await loadGeoData({ states: true });
            if (!geo.states?.features.length) throw new Error('geo loading broken');
            console.log('ESM + geo subpath OK');
          "
          node -e "
            const { ThreatMap, lookupRegionCode } = require('react-threat-map');
            if (typeof ThreatMap !== 'function') throw new Error('CJS require broken');
            if (lookupRegionCode('HK').name !== 'Hong Kong') throw new Error('CJS region lookup broken');
            console.log('CJS OK');
          "
