name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time, and never cancel one mid-flight: a half-finished
# Pages deploy would leave the live site in whatever state it stopped in.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - uses: actions/configure-pages@v6

      # The demo aliases 'react-threat-map' to ../../src, so it needs the root
      # deps (d3-geo, topojson-client) installed alongside its own.
      - run: npm ci

      # The geo JSON under src/geo/data is committed, so no `npm run geo` here —
      # the CI workflow is what guards it against drifting from the build script.
      - name: Build demo
        working-directory: examples/demo
        env:
          DEMO_BASE: /${{ github.event.repository.name }}/
        run: |
          npm install
          npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: examples/demo/dist

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
